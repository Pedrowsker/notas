<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notas Fiscais</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:    #0f172a;
      --blue:    #2563eb;
      --blue-lt: #dbeafe;
      --blue-dk: #1d4ed8;
      --slate:   #334155;
      --muted:   #64748b;
      --border:  #e2e8f0;
      --bg:      #f1f5f9;
      --surface: #ffffff;
      --green:   #16a34a;
      --green-lt:#dcfce7;
      --red:     #dc2626;
      --red-lt:  #fee2e2;
      --amber:   #d97706;
      --amber-lt:#fef3c7;
      --radius:  12px;
      --shadow:  0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }
    
    html, body { 
      font-family: 'Inter', sans-serif; 
      background: var(--bg); 
      color: var(--navy); 
      min-height: 100vh; 
      overflow-x: hidden; /* Previne a tela de ser arrastada para os lados */
    }

    /* ── Mobile Header (Oculto no PC) ────────────── */
    .mobile-header {
      display: none;
      background: var(--navy);
      color: #fff;
      padding: 16px;
      align-items: center;
      justify-content: space-between;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 150;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .mobile-brand { display: flex; align-items: center; gap: 10px; }
    .mobile-brand .logo-icon { font-size: 20px; }
    .mobile-brand h1 { font-size: 1rem; font-weight: 700; }
    .btn-menu {
      background: none; border: none; color: #fff;
      font-size: 24px; cursor: pointer; display: flex; align-items: center;
    }

    /* ── Sidebar ──────────────────────────────────── */
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--navy);
      display: flex; flex-direction: column;
      padding: 28px 0;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform 0.3s ease;
    }
    .sidebar-brand {
      padding: 0 24px 28px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-brand .logo-icon {
      width: 36px; height: 36px; background: var(--blue);
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 18px; margin-bottom: 10px;
    }
    .sidebar-brand h1 { color: #fff; font-size: .9rem; font-weight: 700; line-height: 1.3; }
    .sidebar-brand p  { color: #64748b; font-size: .73rem; margin-top: 2px; }
    .sidebar-nav { padding: 20px 12px; flex: 1; }
    .nav-label { color: #475569; font-size: .68rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; padding: 0 12px 8px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      color: #94a3b8; font-size: .85rem; font-weight: 500;
      cursor: pointer; transition: all .15s; margin-bottom: 2px;
      border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,.06); color: #e2e8f0; }
    .nav-item.active { background: rgba(37,99,235,.25); color: #93c5fd; }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,.08); }
    .sidebar-footer p { color: #475569; font-size: .72rem; }

    /* Botão de fechar menu no mobile (oculto no PC) */
    .sidebar-close { display: none; }

    /* ── Main content ─────────────────────────────── */
    .main { margin-left: 240px; flex: 1; padding: 32px 36px; max-width: 1100px; }

    /* ── Topbar ───────────────────────────────────── */
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .topbar-left h2 { font-size: 1.4rem; font-weight: 700; color: var(--navy); }
    .topbar-left p  { color: var(--muted); font-size: .85rem; margin-top: 2px; }
    .btn-primary {
      background: var(--blue); color: #fff; border: none;
      padding: 10px 20px; border-radius: 8px; font-size: .88rem;
      font-weight: 600; cursor: pointer; display: flex; align-items: center;
      gap: 7px; transition: background .15s; font-family: inherit;
    }
    .btn-primary:hover { background: var(--blue-dk); }

    /* ── Stat cards ───────────────────────────────── */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 20px; box-shadow: var(--shadow);
      border-left: 3px solid transparent;
    }
    .stat-card.blue  { border-color: var(--blue); }
    .stat-card.green { border-color: var(--green); }
    .stat-card.amber { border-color: var(--amber); }
    .stat-card.red   { border-color: var(--red); }
    .stat-label { font-size: .75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .stat-value { font-size: 1.6rem; font-weight: 800; color: var(--navy); line-height: 1; }
    .stat-sub   { font-size: .75rem; color: var(--muted); margin-top: 4px; }

    /* ── Table card ───────────────────────────────── */
    .table-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .table-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid var(--border);
    }
    .table-header h3 { font-size: 1rem; font-weight: 700; }
    .search-wrap { position: relative; }
    .search-wrap input {
      padding: 8px 12px 8px 36px; border: 1px solid var(--border);
      border-radius: 8px; font-size: .83rem; font-family: inherit;
      color: var(--navy); background: var(--bg); width: 220px;
      outline: none; transition: border .15s;
    }
    .search-wrap input:focus { border-color: var(--blue); }
    .search-wrap .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 12px 16px; text-align: left;
      font-size: .73rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em;
      background: #f8fafc; border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }
    tbody td { padding: 14px 16px; font-size: .87rem; color: var(--slate); vertical-align: middle; }
    td.company { font-weight: 600; color: var(--navy); }
    td.amount   { font-weight: 700; color: var(--blue); font-size: .9rem; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600;
    }
    .badge.issued  { background: var(--green-lt); color: var(--green); }
    .badge.pending { background: var(--amber-lt); color: var(--amber); }

    .actions { display: flex; gap: 6px; }
    .btn-icon {
      width: 30px; height: 30px; border-radius: 6px; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all .15s; background: transparent; color: var(--muted);
    }
    .btn-icon:hover.edit   { background: var(--blue-lt);  color: var(--blue); }
    .btn-icon:hover.email  { background: var(--green-lt); color: var(--green); }
    .btn-icon:hover.del    { background: var(--red-lt);   color: var(--red); }
    .btn-icon:hover.toggle { background: var(--green-lt); color: var(--green); }
    .btn-icon:hover.untoggle { background: var(--amber-lt); color: var(--amber); }

    .empty-state { padding: 60px 24px; text-align: center; color: var(--muted); }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: .9rem; }

    /* ── Modal ────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border-radius: 16px;
      padding: 32px; width: 100%; max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      transform: translateY(16px); transition: transform .2s;
    }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-head h3 { font-size: 1.1rem; font-weight: 700; }
    .modal-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--muted); line-height: 1; padding: 2px; }
    .modal-close:hover { color: var(--navy); }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: .82rem; font-weight: 600; color: var(--slate); margin-bottom: 6px; }
    .field input, .field textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: .88rem; font-family: inherit;
      color: var(--navy); outline: none; transition: border .15s;
      background: #fafbfc;
    }
    .field input:focus, .field textarea:focus { border-color: var(--blue); background: #fff; }
    .field textarea { resize: vertical; min-height: 72px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .modal-footer { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
    .btn-ghost {
      background: none; border: 1px solid var(--border); color: var(--slate);
      padding: 9px 18px; border-radius: 8px; font-size: .87rem;
      font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .btn-ghost:hover { border-color: var(--slate); color: var(--navy); }

    /* ── Toast ────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--navy); color: #fff;
      padding: 12px 20px; border-radius: 10px;
      font-size: .85rem; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,.2);
      transform: translateY(12px); opacity: 0;
      transition: all .25s; pointer-events: none; z-index: 999;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { background: #14532d; }
    #toast.error   { background: #7f1d1d; }

    /* ── Spinner ──────────────────────────────────── */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 900px) {
      .sidebar { width: 200px; }
      .main { margin-left: 200px; padding: 24px 20px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
    
    /* Configurações específicas para Celulares */
    @media (max-width: 640px) {
      .mobile-header { display: flex; }
      
      /* Sidebar vira um menu deslizante (Gaveta) */
      .sidebar { 
        transform: translateX(-100%); 
        width: 260px; 
        box-shadow: 4px 0 24px rgba(0,0,0,0.3);
        z-index: 250;
      }
      .sidebar.menu-open { transform: translateX(0); }
      
      /* Botão para fechar a sidebar no mobile */
      .sidebar-close {
        display: block;
        position: absolute;
        top: 16px; right: 16px;
        background: none; border: none; color: #94a3b8;
        font-size: 20px; cursor: pointer;
      }

      .main { margin-left: 0; padding: 80px 16px 16px 16px; width: 100%; box-sizing: border-box; } 
      
      /* Topbar */
      .topbar { flex-direction: column; align-items: stretch; gap: 16px; margin-bottom: 24px; }
      .topbar-left h2 { font-size: 1.25rem; }
      .topbar .btn-primary { width: 100%; justify-content: center; padding: 12px; }
      
      /* Stats Cards */
      .stats { grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
      .stat-card { padding: 16px; }
      .stat-value { font-size: 1.3rem; }
      #stat-amount { font-size: 1rem !important; }

      /* Tabela e Busca - Focada em não gerar scroll horizontal */
      .table-header { flex-direction: column; align-items: stretch; gap: 12px; padding: 16px; }
      .search-wrap, .search-wrap input { width: 100%; }
      
      /* Oculta colunas menos urgentes no celular para encaixar na tela perfeitamente */
      thead th:nth-child(3), tbody td:nth-child(3), /* E-mail */
      thead th:nth-child(5), tbody td:nth-child(5), /* Cadastrada em */
      thead th:nth-child(6), tbody td:nth-child(6) { /* Emitida em */
        display: none; 
      }
      
      table { width: 100%; }
      thead th, tbody td { padding: 12px 6px; font-size: 0.8rem; }
      .actions { flex-wrap: wrap; gap: 4px; justify-content: flex-end; }
      td.amount { font-size: 0.8rem; }

      /* Modal */
      .modal { padding: 24px 20px; width: calc(100% - 32px); margin: 16px auto; }
      .field-row { grid-template-columns: 1fr; gap: 0; }
      .modal-footer { flex-direction: column-reverse; gap: 8px; margin-top: 16px; }
      .modal-footer button, .modal-footer .btn-ghost { width: 100%; justify-content: center; padding: 12px; }

      /* Toast Notifications */
      #toast { right: 16px; left: 16px; bottom: 16px; text-align: center; }
    }
  </style>
</head>
<body>

<header class="mobile-header">
  <div class="mobile-brand">
    <span class="logo-icon">📄</span>
    <h1>Notas Fiscais</h1>
  </div>
  <button class="btn-menu" onclick="toggleMenu(true)">☰</button>
</header>

<div class="layout">
  <aside class="sidebar" id="app-sidebar">
    <button class="sidebar-close" onclick="toggleMenu(false)">✕</button>
    
    <div class="sidebar-brand">
      <div class="logo-icon">📄</div>
      <h1>Notas Fiscais</h1>
      <p>Painel de controle</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Menu</div>
      <button class="nav-item active" onclick="showSection('dashboard')">
        <span class="icon">📊</span> Dashboard
      </button>
      <button class="nav-item" onclick="openModalMobile()">
        <span class="icon">➕</span> Nova Nota
      </button>
    </nav>
    <div class="sidebar-footer">
      <p>v2.0 · Vercel + MongoDB</p>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <h2>Dashboard</h2>
        <p id="topbar-date"></p>
      </div>
      <button class="btn-primary" onclick="openModal()">
        <span>＋</span> Nova Nota Fiscal
      </button>
    </div>

    <div class="stats">
      <div class="stat-card blue">
        <div class="stat-label">Total de Notas</div>
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-sub">cadastradas</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Pendentes</div>
        <div class="stat-value" id="stat-pending">—</div>
        <div class="stat-sub">aguardando emissão</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Emitidas</div>
        <div class="stat-value" id="stat-issued">—</div>
        <div class="stat-sub">concluídas</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Valor Total</div>
        <div class="stat-value" id="stat-amount" style="font-size:1.15rem">—</div>
        <div class="stat-sub">em aberto</div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <h3>Notas Cadastradas</h3>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search" placeholder="Buscar empresa..." oninput="renderTable()">
        </div>
      </div>
      <div id="table-wrap">
        <div class="empty-state">
          <div class="empty-icon">⏳</div>
          <p>Carregando notas...</p>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-backdrop" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title">Nova Nota Fiscal</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="field">
      <label>Empresa / Cliente *</label>
      <input type="text" id="f-company" placeholder="Nome da empresa">
    </div>
    <div class="field-row">
      <div class="field">
        <label>CNPJ</label>
        <input type="text" id="f-cnpj" placeholder="00.000.000/0001-00" maxlength="18">
      </div>
      <div class="field">
        <label>Valor (R$) *</label>
        <input type="number" id="f-amount" placeholder="0,00" step="0.01" min="0">
      </div>
    </div>
    <div class="field">
      <label>E-mail para lembrete *</label>
      <input type="email" id="f-email" placeholder="contato@empresa.com">
    </div>
    <div class="field">
      <label>Observações</label>
      <textarea id="f-notes" placeholder="Informações adicionais sobre esta nota..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" id="btn-save" onclick="saveInvoice()">
        <span id="save-label">Salvar Nota</span>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = '/api';
  let invoices = [];
  let editingId = null;

  // ── Funções de controle do Menu Mobile ───────────
  function toggleMenu(open) {
    const sidebar = document.getElementById('app-sidebar');
    if (open) {
      sidebar.classList.add('menu-open');
    } else {
      sidebar.classList.remove('menu-open');
    }
  }

  function openModalMobile() {
    toggleMenu(false); // Fecha o menu lateral
    openModal();       // Abre o modal padrão
  }

  function showSection(section) {
    toggleMenu(false);
  }

  // ── Date header ──────────────────────────────────
  document.getElementById('topbar-date').textContent =
    new Date().toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // ── CNPJ mask ────────────────────────────────────
  document.getElementById('f-cnpj').addEventListener('input', function() {
    let v = this.value.replace(/\D/g, '').slice(0,14);
    if (v.length > 12) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{0,2})/, '$1.$2.$3/$4-$5');
    else if (v.length > 8) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{0,4})/, '$1.$2.$3/$4');
    else if (v.length > 5) v = v.replace(/^(\d{2})(\d{3})(\d{0,3})/, '$1.$2.$3');
    else if (v.length > 2) v = v.replace(/^(\d{2})(\d{0,3})/, '$1.$2');
    this.value = v;
  });

  // ── Load invoices ─────────────────────────────────
  async function load() {
    try {
      const res = await fetch(`${API}/invoices`);
      invoices = await res.json();
      updateStats();
      renderTable();
    } catch(e) {
      showToast('Erro ao carregar notas.', 'error');
    }
  }

  // ── Stats ─────────────────────────────────────────
  function updateStats() {
    const pending = invoices.filter(i => !i.issued);
    const issued  = invoices.filter(i => i.issued);
    const total   = pending.reduce((s, i) => s + i.amount, 0);
    document.getElementById('stat-total').textContent   = invoices.length;
    document.getElementById('stat-pending').textContent = pending.length;
    document.getElementById('stat-issued').textContent  = issued.length;
    document.getElementById('stat-amount').textContent  =
      total.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
  }

  // ── Render table ──────────────────────────────────
  function renderTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = invoices.filter(i =>
      i.company.toLowerCase().includes(q) ||
      (i.cnpj || '').includes(q) ||
      (i.email || '').toLowerCase().includes(q)
    );

    if (!filtered.length) {
      document.getElementById('table-wrap').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <p>${invoices.length ? 'Nenhuma nota encontrada para essa busca.' : 'Nenhuma nota cadastrada ainda. Clique em "Nova Nota Fiscal" para começar.'}</p>
        </div>`;
      return;
    }

    const rows = filtered.map(inv => {
      const created  = new Date(inv.createdAt).toLocaleDateString('pt-BR');
      const issuedAt = inv.issuedAt ? new Date(inv.issuedAt).toLocaleDateString('pt-BR') : '—';
      const amount   = Number(inv.amount).toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
      const badge    = inv.issued
        ? `<span class="badge issued">✔ Emitida</span>`
        : `<span class="badge pending">⏳ Pendente</span>`;
      const toggleTitle = inv.issued ? 'Marcar como pendente' : 'Marcar como emitida';
      const toggleIcon  = inv.issued ? '↩️' : '✅';
      const toggleClass = inv.issued ? 'untoggle' : 'toggle';

      return `<tr>
        <td class="company">
          ${inv.company}
          ${inv.cnpj ? `<br><span style="font-size:.75rem;color:var(--muted);font-weight:400;">${inv.cnpj}</span>` : ''}
        </td>
        <td class="amount">${amount}</td>
        <td style="color:var(--muted);font-size:.82rem;">${inv.email}</td>
        <td>${badge}</td>
        <td style="color:var(--muted);font-size:.82rem;">${created}</td>
        <td style="color:var(--muted);font-size:.82rem;">${issuedAt}</td>
        <td>
          <div class="actions">
            <button class="btn-icon edit"   title="Editar"              onclick="openEdit('${inv._id}')">✏️</button>
            <button class="btn-icon email"  title="Enviar lembrete"     onclick="sendEmail('${inv._id}', this)">📧</button>
            <button class="btn-icon ${toggleClass}" title="${toggleTitle}" onclick="toggleIssued('${inv._id}', ${!inv.issued})">${toggleIcon}</button>
            <button class="btn-icon del"    title="Excluir"             onclick="deleteInvoice('${inv._id}')">🗑️</button>
          </div>
        </td>
      </tr>`;
    }).join('');

    document.getElementById('table-wrap').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Empresa</th>
            <th>Valor</th>
            <th>E-mail</th>
            <th>Status</th>
            <th>Cadastrada em</th>
            <th>Emitida em</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── Modal ─────────────────────────────────────────
  function openModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Nova Nota Fiscal';
    document.getElementById('save-label').textContent  = 'Salvar Nota';
    ['f-company','f-cnpj','f-amount','f-email','f-notes'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('modal').classList.add('open');
    document.getElementById('f-company').focus();
  }

  function openEdit(id) {
    const inv = invoices.find(i => i._id === id);
    if (!inv) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Editar Nota Fiscal';
    document.getElementById('save-label').textContent  = 'Salvar Alterações';
    document.getElementById('f-company').value = inv.company || '';
    document.getElementById('f-cnpj').value    = inv.cnpj    || '';
    document.getElementById('f-amount').value  = inv.amount  || '';
    document.getElementById('f-email').value   = inv.email   || '';
    document.getElementById('f-notes').value   = inv.notes   || '';
    document.getElementById('modal').classList.add('open');
    document.getElementById('f-company').focus();
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  // ── Save (create or update) ───────────────────────
  async function saveInvoice() {
    const company = document.getElementById('f-company').value.trim();
    const amount  = parseFloat(document.getElementById('f-amount').value);
    const email   = document.getElementById('f-email').value.trim();
    if (!company || !amount || !email) {
      showToast('Preencha empresa, valor e e-mail.', 'error'); return;
    }
    const body = {
      company,
      cnpj:  document.getElementById('f-cnpj').value.trim(),
      amount,
      email,
      notes: document.getElementById('f-notes').value.trim()
    };

    const btn = document.getElementById('btn-save');
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;

    try {
      let res;
      if (editingId) {
        res = await fetch(`${API}/invoice?id=${editingId}`, {
          method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
        });
      } else {
        res = await fetch(`${API}/invoices`, {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
        });
      }
      if (!res.ok) throw new Error(await res.text());
      closeModal();
      await load();
      showToast(editingId ? 'Nota atualizada!' : 'Nota cadastrada!', 'success');
    } catch(e) {
      showToast('Erro ao salvar nota.', 'error');
    } finally {
      btn.innerHTML = '<span id="save-label">Salvar Nota</span>';
      btn.disabled = false;
    }
  }

  // ── Toggle issued ─────────────────────────────────
  async function toggleIssued(id, issued) {
    try {
      const res = await fetch(`${API}/invoice?id=${id}`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ issued })
      });
      if (!res.ok) throw new Error();
      await load();
      showToast(issued ? 'Nota marcada como emitida!' : 'Nota marcada como pendente.', 'success');
    } catch(e) {
      showToast('Erro ao atualizar status.', 'error');
    }
  }

  // ── Send email ────────────────────────────────────
  async function sendEmail(id, btn) {
    btn.textContent = '⏳';
    btn.disabled = true;
    try {
      const res = await fetch(`${API}/send-email`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ invoiceId: id })
      });
      if (!res.ok) throw new Error();
      showToast('Lembrete enviado com sucesso!', 'success');
    } catch(e) {
      showToast('Erro ao enviar e-mail.', 'error');
    } finally {
      btn.textContent = '📧';
      btn.disabled = false;
    }
  }

  // ── Delete ────────────────────────────────────────
  async function deleteInvoice(id) {
    if (!confirm('Excluir esta nota fiscal permanentemente?')) return;
    try {
      await fetch(`${API}/invoice?id=${id}`, { method: 'DELETE' });
      await load();
      showToast('Nota excluída.', 'success');
    } catch(e) {
      showToast('Erro ao excluir.', 'error');
    }
  }

  // ── Toast ─────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, 3000);
  }

  // ── Keyboard shortcuts ────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); toggleMenu(false); }
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openModal(); }
  });

  // ── Init ──────────────────────────────────────────
  load();
</script>
</body>
</html>
